server:
  port: 8080

spring:
  datasource:
    # --- H2 IN-MEMORY DATABASE (Zero Configuration, perfect for sharing) ---
    url: jdbc:h2:mem:pos_db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    
    # --- MYSQL DATABASE (Uncomment this and comment H2 for Production) ---
    # url: ${DB_URL:jdbc:mysql://localhost:3306/pos_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    # username: ${DB_USERNAME:root}
    # password: ${DB_PASSWORD:Sahu@177}
    # driver-class-name: com.mysql.cj.jdbc.Driver
    
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      
